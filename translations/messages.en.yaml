faq:
    q1: "How are charges split?"
    a1: "Charges are computed automatically using the share set up by your landlord."
    q2: "Is this site eco-friendly?"
    a2: "Yes! Lean architecture, single inlined CSS, minimal JavaScript, reduced server requests."
    q3: "Is my data secure?"
    a3: "Passwords are hashed (argon/bcrypt), CSRF is enabled, HTTPS is recommended in production."
