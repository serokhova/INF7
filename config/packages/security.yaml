security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        
        api:
            pattern: ^/[a-z]{2}/api/
            stateless: true
            http_basic:
                realm: 'API Securisée Coloc'

        main:
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: app_login
                check_path: app_login
                enable_csrf: true
                default_target_path: app_home
            logout:
                path: app_logout
                target: app_home

    role_hierarchy:
        ROLE_TENANT: ROLE_USER
        ROLE_OWNER: ROLE_USER
        ROLE_ADMIN: [ROLE_OWNER, ROLE_TENANT]

    access_control:
        - { path: '^/[a-z]{2}/owner', roles: ROLE_OWNER }
        - { path: '^/[a-z]{2}/tenant', roles: ROLE_TENANT }
        - { path: '^/[a-z]{2}/chores', roles: ROLE_USER }
        - { path: '^/[a-z]{2}/messages', roles: ROLE_USER }
        - { path: '^/[a-z]{2}/change-password', roles: ROLE_USER }
        - { path: '^/[a-z]{2}/api', roles: ROLE_USER }
